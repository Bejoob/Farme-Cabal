<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Checklist - Cabal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="brand">
                <div class="logo">⚔️</div>
                <div>
                    <h1>Farm Checklist</h1>
                    <p class="subtitle">Cabal Ascension • Diário</p>
                </div>
            </div>
            <div class="day-info">
                <span id="currentDay" class="chip"></span>
                <span id="headerProgress" class="chip goal">0/0 DGs</span>
            </div>
        </header>

        <main class="content">
            <section class="controls">
                <div class="library-section">
                    <h3>Biblioteca de Dungeons</h3>
                    <form id="addLibraryForm" autocomplete="off">
                        <div class="form-row">
                            <input id="libraryDungeonInput" type="text" placeholder="Nome da dungeon" maxlength="60" required />
                            <button type="submit" class="btn primary">Adicionar à Biblioteca</button>
                        </div>
                    </form>
                    <div id="libraryList" class="library-list"></div>
                </div>
                
                <div class="daily-section">
                    <h3>Dungeons de Hoje</h3>
                    <div id="availableDungeons" class="available-dungeons"></div>
                </div>
                <div class="progress-wrap">
                    <div class="progress-header">
                        <span>Progresso</span>
                        <span id="progressText">0/0</span>
                    </div>
                    <div class="progress-bar" aria-label="Barra de progresso">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>
            </section>

            <section class="list-section">
                <ul id="dungeonList" class="list" aria-live="polite"></ul>
                <div id="congrats" class="congrats" hidden>
                    <div class="confetti" aria-hidden="true"></div>
                    <p>Parabéns! Meta do dia concluída! 🎉</p>
                </div>
            </section>

            <section class="alz-section">
                <div class="alz-container">
                    <h3>Biblioteca de Alzes</h3>
                    <form id="addAlzForm" autocomplete="off">
                        <div class="form-row">
                            <input id="alzNameInput" type="text" placeholder="Nome do farm (ex: Dungeon X)" maxlength="60" required />
                            <input id="alzValueInput" type="number" placeholder="Valor (1=1M, 10=10M, 100=100M)" min="1" step="1" required />
                            <button type="submit" class="btn primary">Adicionar à Biblioteca</button>
                        </div>
                    </form>
                    <div id="alzLibraryList" class="library-list"></div>
                    
                    <div class="alz-summary">
                        <h4>Resumo dos Alzes</h4>
                        <div class="alz-total">
                            <span class="alz-total-label">Total de Alzes:</span>
                            <span id="alzTotalValue" class="alz-total-value">0</span>
                        </div>
                        <div class="alz-breakdown">
                            <div class="alz-breakdown-item">
                                <span class="alz-breakdown-label">Farms adicionados:</span>
                                <span id="alzFarmsCount" class="alz-breakdown-value">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="weekday-goals">
                <span class="weekday" data-day="1">Seg</span>
                <span class="weekday" data-day="2">Ter</span>
                <span class="weekday" data-day="3">Qua</span>
                <span class="weekday" data-day="4">Qui</span>
                <span class="weekday" data-day="5">Sex</span>
                <span class="weekday" data-day="6">Sáb</span>
                <span class="weekday" data-day="0">Dom</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
<!-- Feito com ❤ para organizar seu farm -->
 </html>
